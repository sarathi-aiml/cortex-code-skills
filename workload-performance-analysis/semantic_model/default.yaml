custom_instructions: |
  CRITICAL RULES FOR CONSISTENT RESULTS:
  
  [MANDATORY] WAREHOUSE_NAME AND WAREHOUSE_SIZE MUST ALWAYS APPEAR TOGETHER:
  - Whenever warehouse_name is in SELECT, warehouse_size MUST also be in SELECT
  - Whenever warehouse_name is in GROUP BY, warehouse_size MUST also be in GROUP BY
  - This rule has NO exceptions. Never include warehouse_name without warehouse_size.
  
  1. NO ARBITRARY THRESHOLDS: Never add HAVING clauses with thresholds (like spilling > 1GB, cache_hit_pct < 50%) unless the user explicitly requests a filter. Return all relevant data and let the user interpret.
  
  2. QUERY-LEVEL RESULTS - REQUIRED FIELDS: For ANY analysis that returns individual queries (slowest queries, spilling queries, pruning queries, QAS eligible queries, etc.), ALWAYS include these columns:
     - query_id
     - warehouse_name
     - warehouse_size
     - start_time
     - ROUND(execution_time / 1000.0, 2) AS execution_seconds
     - user_name
     - LEFT(query_text, 100) AS query_preview
  
  3. WAREHOUSE RESULTS - REQUIRED FIELDS: For ANY analysis involving warehouses (individual warehouse details, warehouse comparisons, grouped by warehouse), ALWAYS include:
     - warehouse_name
     - warehouse_size
     This applies to: cache hit rates, spilling analysis, QAS eligibility, query counts by warehouse, or any question mentioning a specific warehouse.
  
  4. TABLE/COLUMN-LEVEL RESULTS - REQUIRED FIELDS: For column or table analysis, ALWAYS include:
     - database_name || '.' || schema_name || '.' || table_name AS fully_qualified_table
  
  5. USE ILIKE FOR NAME FILTERING: When filtering by warehouse_name, table_name, user_name, etc., use ILIKE instead of = for case-insensitive matching.
  
  6. USE COALESCE FOR AGGREGATIONS: Always use COALESCE or ZEROIFNULL for spilling and other nullable columns: SUM(COALESCE(bytes_spilled_to_local_storage, 0)).
  
  7. DEFAULT TIME RANGE: Use 7 days as the default unless user specifies otherwise.
  
  8. HUMAN-READABLE UNITS: Convert bytes to GB (bytes / 1024 / 1024 / 1024), milliseconds to seconds (ms / 1000).
  
  DATA SOURCES:
  - QUERY_HISTORY: Query execution metrics including spilling, local disk cache hit rate (percentage_scanned_from_cache), execution time, partitions_scanned/partitions_total for query-level pruning analysis
  - QUERY_ACCELERATION_ELIGIBLE: Queries that could benefit from QAS (has query_id, query_text, warehouse_name, warehouse_size)
  - TABLE_QUERY_PRUNING_HISTORY: Table-level pruning statistics (aggregated over intervals, NO query_id or warehouse info)
  - COLUMN_QUERY_PRUNING_HISTORY: Column-level pruning and search optimization candidates (aggregated over intervals, NO query_id or warehouse info)
  
  CACHE HIT RATE CALCULATION (LOCAL DISK CACHE):
  - percentage_scanned_from_cache measures the LOCAL DISK CACHE (also called warehouse cache) — the SSD/memory cache on compute nodes. It does NOT measure the query result cache or metadata cache.
  - USE the column percentage_scanned_from_cache from QUERY_HISTORY - this is the correct local disk cache hit rate
  - DO NOT calculate cache hit rate manually from bytes_scanned - use the existing column
  - Formula: AVG(percentage_scanned_from_cache) for warehouse-level local disk cache hit rates
  - Terminology: Mirror the user's term. If the user says "local disk cache", use that. If "warehouse cache", use that. Both refer to the same cache.
  
  PRUNING ANALYSIS DATA SOURCE:
  - For "queries with worst pruning" or any query-level pruning analysis: Use QUERY_HISTORY (has query_id, warehouse_name, warehouse_size, partitions_scanned, partitions_total)
  - For "tables with worst pruning" or table-level analysis: Use TABLE_QUERY_PRUNING_HISTORY (aggregated, no individual query details)
  
  SPILLING ANALYSIS: 
  - Causes: Warehouse too small, high concurrency, complex joins/aggregations
  - bytes_spilled_to_local_storage = warehouse may be undersized
  - bytes_spilled_to_remote_storage = severe memory pressure
  - Suggestions: Increase warehouse size, reduce concurrent queries, schedule heavy queries off-peak
  
  POOR PRUNING:
  - Causes: Missing/ineffective clustering keys, queries not filtering on clustered columns
  - Suggestions: Add clustering on frequently filtered columns, consider search optimization for point lookups
  
  LOW CACHE HIT:
  - Causes: Irregular query patterns, frequently changing data, insufficient query repetition
  - Suggestions: Consolidate similar queries, increase query frequency on stable data
  
  QAS ELIGIBLE:
  - Causes: Queries with selective filters on large tables benefit from parallel processing
  - Suggestions: Enable QAS with ALTER WAREHOUSE <name> SET ENABLE_QUERY_ACCELERATION = TRUE
  
  SEARCH OPTIMIZATION: Columns with search_optimization_supported_expressions are candidates. Best for point lookups and equality predicates on high-cardinality columns.
  
  CLUSTERING KEY CANDIDATES: Identify by analyzing columns with high avg_potential_avoidable_partitions and frequent use (num_queries).
  
  AGGREGATION NOTE: TABLE_QUERY_PRUNING_HISTORY and COLUMN_QUERY_PRUNING_HISTORY contain aggregated data over intervals, not individual query records. Use interval_start_time for time filtering. num_queries shows how many queries contributed to each record.
