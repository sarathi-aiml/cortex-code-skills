verified_queries:
  - name: Warehouses with bad cache hit rates and significant scan and query volume
    question: Which warehouses have the worst cache hit rates?
    sql: SELECT warehouse_name, warehouse_size, COUNT(*) AS query_count, ROUND(AVG(percentage_scanned_from_cache), 1) AS avg_cache_hit_pct, ROUND(AVG(execution_time) / 1000.0, 2) AS avg_execution_seconds, ROUND(AVG(bytes_scanned) / 1024 / 1024 / 1024.0, 2) AS avg_gb_scanned FROM __query_history WHERE start_time >= DATEADD('day', -7, CURRENT_DATE()) AND warehouse_name IS NOT NULL AND bytes_scanned > 0 GROUP BY warehouse_name, warehouse_size ORDER BY avg_cache_hit_pct ASC LIMIT 20
    verified_at: 1727654400
    verified_by: System

  - name: Which warehouses have the most QAS eligible time?
    question: Which warehouses have the most QAS eligible time?
    sql: SELECT warehouse_name, warehouse_size, COUNT(*) AS eligible_query_count, ROUND(SUM(eligible_query_acceleration_time), 2) AS total_eligible_seconds, ROUND(AVG(eligible_query_acceleration_time), 2) AS avg_eligible_seconds_per_query, ROUND(AVG(upper_limit_scale_factor), 1) AS avg_scale_factor, MAX(upper_limit_scale_factor) as max_scale_factor FROM __query_acceleration_eligible WHERE start_time >= DATEADD('day', -7, CURRENT_DATE()) AND warehouse_name IS NOT NULL GROUP BY warehouse_name, warehouse_size ORDER BY total_eligible_seconds DESC LIMIT 20
    verified_at: 1727654400
    verified_by: System
  - name: Which queries are eligible for query acceleration service?
    question: Which queries are eligible for query acceleration service?
    sql: SELECT query_id, LEFT(query_text, 100) AS query_preview, warehouse_name, warehouse_size, ROUND(eligible_query_acceleration_time, 2) AS eligible_acceleration_seconds, upper_limit_scale_factor, start_time FROM __query_acceleration_eligible WHERE start_time >= DATEADD('day', -7, CURRENT_DATE()) AND warehouse_name IS NOT NULL ORDER BY eligible_query_acceleration_time DESC LIMIT 20
    verified_at: 1727654400
    verified_by: System

  - name: What QAS scale factor should be used for a warehouse?
    question: What QAS scale factor should be used for a warehouse?
    sql: SELECT warehouse_name, warehouse_size, CASE WHEN upper_limit_scale_factor BETWEEN 1 AND 4 THEN '1-4' WHEN upper_limit_scale_factor BETWEEN 5 AND 8 THEN '5-8' WHEN upper_limit_scale_factor BETWEEN 9 AND 16 THEN '9-16' ELSE '17+' END AS scale_factor_bucket, COUNT(*) AS query_count, ROUND(SUM(eligible_query_acceleration_time), 2) AS total_eligible_seconds, ROUND(AVG(eligible_query_acceleration_time), 2) AS avg_eligible_seconds_per_query FROM __query_acceleration_eligible WHERE start_time >= DATEADD('day', -7, CURRENT_DATE()) AND warehouse_name IS NOT NULL GROUP BY warehouse_name, warehouse_size, scale_factor_bucket ORDER BY warehouse_name, warehouse_size, scale_factor_bucket
    verified_at: 1727654400
    verified_by: System
  - name: Which queries are causing the most spilling?
    question: Which queries are causing the most spilling?
    sql: SELECT qh.query_id, qh.query_type, qh.user_name, qh.warehouse_name, qh.warehouse_size, LEFT(qh.query_text, 100) AS query_preview, ROUND(qh.bytes_spilled_to_local_storage / 1024 / 1024 / 1024.0, 2) AS local_spill_gb, ROUND(qh.bytes_spilled_to_remote_storage / 1024 / 1024 / 1024.0, 2) AS remote_spill_gb, ROUND(qh.execution_time / 1000.0, 2) AS execution_seconds, qh.start_time FROM __query_history AS qh WHERE qh.start_time >= DATEADD('day', -7, CURRENT_DATE()) AND (qh.bytes_spilled_to_local_storage > 0 OR qh.bytes_spilled_to_remote_storage > 0) ORDER BY qh.bytes_spilled_to_local_storage + qh.bytes_spilled_to_remote_storage DESC LIMIT 20
    verified_at: 1727654400
    verified_by: System
  - name: Pruning opportunity, sorted by the potential to avoid partitions
    question: Which tables have the most opportunity to improve pruning rate?
    sql: SELECT tp.database_name, tp.schema_name, tp.table_name, tp.database_name || '.' || tp.schema_name || '.' || tp.table_name AS fully_qualified_table, tp.table_id, SUM(tp.num_queries) AS query_count, SUM(tp.partitions_scanned) AS total_partitions_scanned, SUM(tp.partitions_pruned) AS total_partitions_pruned, sum(tp.rows_matched) as total_rows_matched, sum(tp.rows_pruned) as total_rows_pruned, sum(tp.rows_scanned) as total_rows_scanned, ROUND(CASE WHEN (SUM(tp.partitions_scanned) + SUM(tp.partitions_pruned)) > 0 THEN (CAST(SUM(tp.partitions_pruned) AS FLOAT) / NULLIF((SUM(tp.partitions_scanned) + SUM(tp.partitions_pruned)), 0)) * 100 ELSE 0 END, 2) AS partition_unused_percentage, ROUND((CASE WHEN (sum(rows_pruned) + sum(rows_scanned)) > 0 THEN 100 - (sum(rows_matched)::FLOAT / (sum(rows_pruned) + sum(rows_scanned))) * 100 ELSE 0 END), 2) AS row_unused_percentage, sum(rows_scanned) - sum(rows_matched) as excess_rows_scanned, avg(tp.rows_scanned - tp.rows_matched) as avg_excess_rows_scanned, ROUND(CASE WHEN (SUM(tp.partitions_scanned) + SUM(tp.partitions_pruned)) > 0 and (SUM(tp.rows_pruned) + SUM(tp.rows_scanned)) > 0 then(avg(tp.rows_scanned - tp.rows_matched) / ((sum(tp.rows_scanned) + sum(tp.rows_pruned)) / (sum(tp.partitions_scanned) + sum(tp.partitions_pruned)))) ELSE 0 END, 2) as avg_potential_avoidable_partitions FROM __table_pruning AS tp WHERE tp.interval_start_time >= DATEADD('day', -7, CURRENT_DATE()) GROUP BY tp.database_name, tp.schema_name, tp.table_name, tp.table_id ORDER BY avg_potential_avoidable_partitions desc limit 20
    verified_at: 1
    verified_by: Nick
  - name: Identification of columns that have opportunities to improve pruning rate
    question: Which columns are most frequently used in predicates where there is opportunity to improve pruning rate?
    sql: SELECT cp.database_name, cp.schema_name, cp.table_name, cp.table_id, cp.column_name, cp.COLUMN_ID, SUM(cp.num_queries) AS column_usage_count, ROUND(CASE WHEN (sum(cp.PARTITIONS_PRUNED) + sum(cp.PARTITIONS_SCANNED)) > 0 THEN (CAST(sum(cp.PARTITIONS_PRUNED) AS FLOAT) / (sum(cp.PARTITIONS_PRUNED) + sum(cp.PARTITIONS_SCANNED))) * 100 ELSE 0 END, 2) AS partition_pruning_percentage, ROUND(CASE WHEN (sum(cp.rows_scanned) + sum(cp.rows_pruned)) > 0 THEN 100 - (CAST(sum(cp.rows_matched) AS FLOAT) / (sum(cp.rows_scanned) + sum(cp.rows_pruned))) * 100 ELSE 0 END, 2) AS unused_rows_percentage, sum(cp.rows_scanned) - sum(cp.rows_matched) as excess_rows_scanned, avg(cp.rows_scanned - cp.rows_matched) as avg_excess_rows_scanned, ROUND(CASE WHEN (SUM(cp.partitions_scanned) + SUM(cp.partitions_pruned)) > 0 and (SUM(cp.rows_pruned) + SUM(cp.rows_scanned)) > 0 then(avg(cp.rows_scanned - cp.rows_matched) / ((sum(cp.rows_scanned) + sum(cp.rows_pruned)) / (sum(cp.partitions_scanned) + sum(cp.partitions_pruned)))) ELSE 0 END, 2) as avg_potential_avoidable_partitions FROM __column_pruning AS cp WHERE cp.interval_start_time >= DATEADD('day', -7, CURRENT_DATE()) GROUP BY cp.database_name, cp.schema_name, cp.table_name, cp.table_id, cp.column_name, cp.column_id HAVING column_usage_count > 0 ORDER BY avg_potential_avoidable_partitions desc limit 20
    verified_at: 1
    verified_by: Nick
  - name: Identification of columns that could benefit from search to reduce scan volume
    question: Which columns are candidates for search optimization?
    sql: SELECT cp.database_name, cp.schema_name, cp.table_name, cp.table_id, cp.column_name, cp.column_id, SUM(cp.num_queries) AS query_count, SUM(cp.rows_scanned) AS total_rows_scanned, avg(cp.rows_matched) as average_rows_matched, /* this is the upper bound of parititons scanned that match if we use SOS */ avg(cp.partitions_scanned) as average_partitions_scanned, ROUND(CASE WHEN (SUM(cp.partitions_scanned) + SUM(cp.partitions_pruned)) > 0 AND (SUM(cp.rows_pruned) + SUM(cp.rows_scanned)) > 0 THEN (AVG(cp.rows_scanned - cp.rows_matched) / ((SUM(cp.rows_scanned) + SUM(cp.rows_pruned)) / (SUM(cp.partitions_scanned) + SUM(cp.partitions_pruned)))) ELSE 0 END, 2) as avg_potential_avoidable_partitions, cp.search_optimization_supported_expressions FROM __column_pruning AS cp WHERE cp.interval_start_time >= DATEADD(DAY, -7, CURRENT_DATE) AND NOT cp.search_optimization_supported_expressions IS NULL GROUP BY cp.database_name, cp.schema_name, cp.table_name, cp.column_name, cp.table_id, cp.column_id, cp.search_optimization_supported_expressions ORDER BY avg_potential_avoidable_partitions DESC LIMIT 30;
    verified_at: 1
    verified_by: Nick
  - name: Identification of columns that are used together
    question: What is the pruning opportunity in columns grouped by the columns that are frequently used together?
    sql: with column_agg as (select any_value(database_name) || '.' || any_value(schema_name) || '.' || any_value(table_name) fq_name, query_hash, query_parameterized_hash, access_type, interval_start_time, array_agg(column_name ||case when variant_path is not null then ':' || variant_path else '' end) within group (order by column_name ||case when variant_path is not null then ':' || variant_path else '' end) column_list, array_agg(search_optimization_supported_expressions) within group (order by column_name ||case when variant_path is not null then ':' || variant_path else '' end) sos_supported, any_value(num_queries) num_queries, any_value(aggregate_query_elapsed_time) aggregate_query_elapsed_time, any_value(aggregate_query_compilation_time) aggregate_query_compilation_time, any_value(aggregate_query_execution_time) aggregate_query_execution_time, any_value(partitions_scanned) partitions_scanned, any_value(partitions_pruned) partitions_pruned, any_value(rows_scanned) rows_scanned, any_value(rows_pruned) rows_pruned, any_value(rows_matched) rows_matched from __column_pruning AS cp where interval_start_time >= DATEADD('day', -7, CURRENT_DATE()) group by table_id, schema_id, database_id, warehouse_id, query_hash, query_parameterized_hash, access_type, interval_start_time) select fq_name, column_list, sum(num_queries) as query_count, to_number(sum(aggregate_query_execution_time) / sum(num_queries), 38, 1) as average_query_exec_time, div0(sum(partitions_scanned), sum(num_queries)) as partitions_scanned_per_query, div0(sum(partitions_pruned), sum(partitions_pruned + partitions_scanned)) as pruning_ratio, 1 - (div0(sum(rows_matched), sum(rows_scanned + rows_pruned))) as excess_rows_ratio, sum(rows_scanned) - sum(rows_matched) as excess_rows_scanned, avg(rows_scanned - rows_matched) as avg_excess_rows_scanned, ROUND(CASE WHEN (SUM(partitions_scanned) + SUM(partitions_pruned)) > 0 and (SUM(rows_pruned) + SUM(rows_scanned)) > 0 then(avg(rows_scanned - rows_matched) / ((sum(rows_scanned) + sum(rows_pruned)) / (sum(partitions_scanned) + sum(partitions_pruned)))) ELSE 0 END, 2) as avg_potential_avoidable_partitions from column_agg group by all order by avg_potential_avoidable_partitions desc;
    verified_at: 1
    verified_by: Nick
  - name: What are the top tables by scan volume?
    question: What are the top tables by scan volume?
    sql: SELECT tp.database_name, tp.schema_name, tp.table_name, SUM(tp.num_queries) AS query_count, SUM(tp.rows_scanned) AS total_rows_scanned, SUM(tp.partitions_scanned) AS total_partitions_scanned, ROUND(AVG(CASE WHEN (tp.partitions_scanned + tp.partitions_pruned) > 0 THEN (tp.partitions_pruned::FLOAT / (tp.partitions_scanned + tp.partitions_pruned)) * 100 ELSE 0 END), 2) AS avg_pruning_pct FROM __table_pruning AS tp WHERE tp.interval_start_time >= DATEADD('day', -7, CURRENT_DATE()) GROUP BY tp.database_name, tp.schema_name, tp.table_name ORDER BY total_rows_scanned DESC
    verified_at: 1727654400
    verified_by: System
  - name: Which queries scan the most partitions?
    question: Which queries scan the most partitions?
    sql: SELECT qh.query_id, qh.query_type, qh.user_name, qh.warehouse_name, qh.warehouse_size, qh.partitions_scanned, qh.partitions_total, ROUND((qh.partitions_scanned::FLOAT / NULLIF(qh.partitions_total, 0)) * 100, 2) AS pct_scanned, ROUND(qh.execution_time / 1000.0, 2) AS execution_seconds, ROUND(qh.bytes_scanned / 1024 / 1024 / 1024.0, 2) AS gb_scanned, qh.start_time, LEFT(qh.query_text, 100) AS query_preview FROM __query_history AS qh WHERE qh.start_time >= DATEADD('day', -7, CURRENT_DATE()) AND qh.partitions_scanned > 0 ORDER BY qh.partitions_scanned DESC LIMIT 20
    verified_at: 1727654400
    verified_by: System
  - name: Which queries have the worst pruning efficiency?
    question: Which queries have the worst pruning efficiency?
    sql: SELECT qh.query_id, qh.query_type, qh.user_name, qh.warehouse_name, qh.warehouse_size, qh.partitions_scanned, qh.partitions_total, ROUND((qh.partitions_scanned::FLOAT / NULLIF(qh.partitions_total, 0)) * 100, 2) AS pct_partitions_scanned, ROUND(100 - (qh.partitions_scanned::FLOAT / NULLIF(qh.partitions_total, 0)) * 100, 2) AS pruning_efficiency_pct, ROUND(qh.bytes_scanned / 1024 / 1024 / 1024.0, 2) AS gb_scanned, ROUND(qh.execution_time / 1000.0, 2) AS execution_seconds, qh.start_time, LEFT(qh.query_text, 100) AS query_preview FROM __query_history AS qh WHERE qh.start_time >= DATEADD('day', -7, CURRENT_DATE()) AND qh.partitions_total > 0 AND qh.warehouse_name IS NOT NULL ORDER BY pct_partitions_scanned DESC LIMIT 20
    verified_at: 1727654400
    verified_by: System
  - name: Which queries are the slowest?
    question: Which queries are the slowest?
