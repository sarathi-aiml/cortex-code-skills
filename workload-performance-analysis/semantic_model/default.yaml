        access_modifier: public_access
      - name: DISTINCT_INSIGHT_TYPE_COUNT
        synonyms:
          - distinct insight types
          - unique insight types
        description: Number of distinct insight types
        expr: COUNT(DISTINCT query_insights.insight_type_id)
        access_modifier: public_access
    primary_key:
