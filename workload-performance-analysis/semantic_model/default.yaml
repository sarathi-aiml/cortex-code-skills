name: WORKLOAD_PERFORMANCE_MONITORING
description: Unified semantic view for analyzing workload performance through query optimization (caching efficiency, spilling, QAS eligibility) and storage optimization (partition and column-level pruning rates, clustering key candidates, search optimization opportunities)
tables:
  - name: COLUMN_PRUNING
    synonyms:
      - column access patterns
      - column filter efficiency
      - column pruning data
      - column usage stats
    description: Aggregated column-level pruning statistics showing how columns are used in query filters and joins
    base_table:
      database: SNOWFLAKE
      schema: ACCOUNT_USAGE
      table: COLUMN_QUERY_PRUNING_HISTORY
    dimensions:
      - name: ACCESS_TYPE
        synonyms:
          - column access type
          - column usage
          - filter type
          - usage type
        description: Type of access to the column (e.g., WHERE, JOIN, GROUP_BY, ORDER_BY, SELECT)
        expr: access_type
        data_type: VARCHAR(16777216)
      - name: COLUMN_ID
        synonyms:
          - column identifier
          - column system id
          - column unique identifier
        description: System-generated identifier for the column
        expr: column_id
        data_type: NUMBER(38,0)
      - name: COLUMN_NAME
        synonyms:
          - column
          - column field name
        description: Upper Case name of the column accessed
        expr: column_name
        data_type: VARCHAR(16777216)
      - name: DATABASE_ID
        synonyms:
          - database identifier
          - database unique identifier
        description: System-generated identifier for the database
        expr: database_id
        data_type: NUMBER(38,0)
      - name: DATABASE_NAME
        synonyms:
          - database
          - table database
        description: Upper Case name of the database containing the table
        expr: database_name
        data_type: VARCHAR(16777216)
      - name: INTERVAL_END_TIME
        synonyms:
          - column aggregation end
          - column interval finish
          - column period end
        description: End time of the aggregation interval for column pruning statistics
        expr: interval_end_time
        data_type: TIMESTAMP_LTZ(9)
      - name: INTERVAL_START_TIME
        synonyms:
          - column aggregation start
          - column interval begin
          - column period start
        description: Start time of the aggregation interval for column pruning statistics
        expr: interval_start_time
        data_type: TIMESTAMP_LTZ(9)
      - name: QUERY_HASH
        synonyms:
          - canonical query hash
          - query pattern hash
          - query signature
        description: Hash value based on canonicalized SQL text, useful for identifying similar query patterns
        expr: query_hash
        data_type: VARCHAR(16777216)
      - name: QUERY_PARAMETERIZED_HASH
        synonyms:
          - parameterized hash
          - query template hash
          - query_hash
          - query_signature
        description: Hash value based on parameterized query text, useful for grouping queries with same structure but different literals
        expr: query_parameterized_hash
        data_type: VARCHAR(16777216)
      - name: SCHEMA_ID
        synonyms:
          - schema identifier
          - schema unique identifier
        description: System-generated identifier for the schema
        expr: schema_id
        data_type: NUMBER(38,0)
      - name: SCHEMA_NAME
        synonyms:
          - schema
          - table schema
        description: Upper Case name of the schema containing the table
        expr: schema_name
        data_type: VARCHAR(16777216)
      - name: TABLE_ID
        synonyms:
          - table identifier
          - table unique identifier
        description: System-generated identifier for the table
        expr: table_id
        data_type: NUMBER(38,0)
      - name: TABLE_NAME
        synonyms:
          - table
          - table object name
        description: Upper Case name of the table accessed
        expr: table_name
        data_type: VARCHAR(16777216)
      - name: VARIANT_PATH
        synonyms:
          - column access path
          - column variant path
          - variant access path
        description: Path to the semi-structured data being accessed (if applicable). NULL if the column accessed does not have a semi-structured data type.
        expr: variant_path
        data_type: VARCHAR(16777216)
      - name: WAREHOUSE_ID
        synonyms:
          - warehouse identifier
          - warehouse unique identifier
        description: System-generated identifier for the warehouse that executed the query
        expr: warehouse_id
        data_type: NUMBER(38,0)
    facts:
      - name: AGGREGATE_QUERY_COMPILATION_TIME
        synonyms:
          - column aggregate query compilation time
          - column total compilation time
        description: Total compilation time (in milliseconds) for all queries that matched predicates involving this column during the interval
        expr: aggregate_query_compilation_time
        data_type: NUMBER(38,0)
        access_modifier: public_access
      - name: AGGREGATE_QUERY_ELAPSED_TIME
        synonyms:
          - column aggregate query elapsed time
          - column total query time
        description: Total elapsed time (in milliseconds) for all queries that matched predicates involving this column during the interval
        expr: aggregate_query_elapsed_time
        data_type: NUMBER(38,0)
        access_modifier: public_access
      - name: AGGREGATE_QUERY_EXECUTION_TIME
        synonyms:
          - column aggregate query execution time
          - column total execution time
        description: Total execution time (in milliseconds) for all queries that matched predicates involving this column during the interval
        expr: aggregate_query_execution_time
        data_type: NUMBER(38,0)
        access_modifier: public_access
      - name: NUM_QUERIES
        synonyms:
          - column query count
          - queries using column
        description: Number of queries that accessed this column during the interval
        expr: num_queries
        data_type: NUMBER(38,0)
        access_modifier: public_access
      - name: PARTITIONS_PRUNED
        synonyms:
          - column partitions skipped
          - excluded column partitions
          - pruned column partitions
        description: Number of partitions successfully pruned (not scanned) that matched predicates involving this column during the interval
        expr: partitions_pruned
        data_type: NUMBER(38,0)
        access_modifier: public_access
      - name: PARTITIONS_SCANNED
        synonyms:
          - column partitions read
          - scanned column partitions
        description: Number of partitions scanned that matched predicates involving this column during the interval
        expr: partitions_scanned
        data_type: NUMBER(38,0)
        access_modifier: public_access
      - name: ROWS_MATCHED
        synonyms:
          - column rows returned
          - filtered column rows
          - matching column rows
        description: Number of rows that matched predicates involving this column during the interval
        expr: rows_matched
        data_type: NUMBER(38,0)
        access_modifier: public_access
      - name: ROWS_PRUNED
        synonyms:
          - column rows skipped
          - excluded column rows
          - pruned column rows
        description: Number of rows successfully pruned when this column was part of the query predicate during the interval
        expr: rows_pruned
        data_type: NUMBER(38,0)
        access_modifier: public_access
      - name: ROWS_SCANNED
        synonyms:
          - column rows read
          - scanned column rows
        description: Number of rows scanned when accessing this column during the interval
        expr: rows_scanned
        data_type: NUMBER(38,0)
        access_modifier: public_access
      - name: SEARCH_OPTIMIZATION_SUPPORTED_EXPRESSIONS
        synonyms:
          - search optimization candidates
          - search optimization expressions
          - supported search expressions
        description: Expressions on this column that could benefit from search optimization (VARIANT array) during the interval
        expr: search_optimization_supported_expressions
        data_type: ARRAY
        access_modifier: public_access
    metrics:
      - name: AVG_COLUMN_ROWS_SCANNED
        synonyms:
          - average rows scanned per column query
          - mean column rows scanned
        description: Average number of rows scanned per query filtering on the column
        expr: AVG(DIV0(column_pruning.rows_scanned, NULLIF(column_pruning.num_queries, 0)))
        access_modifier: public_access
      - name: COLUMN_ROW_PRUNING_PERCENTAGE
        synonyms:
          - column filter efficiency
          - column pruning rate
          - column-level pruning percentage
        description: Average percentage of rows pruned when the column was part of the query predicate, indicating predicate filter effectiveness
        expr: AVG(CASE WHEN (column_pruning.rows_scanned + column_pruning.rows_pruned) > 0 THEN (column_pruning.rows_pruned::FLOAT / (column_pruning.rows_scanned + column_pruning.rows_pruned)) * 100 ELSE 0 END)
        access_modifier: public_access
      - name: COLUMN_ROW_WASTED_COUNT
        synonyms:
          - column row unused count
          - column rows unused
          - column wasted rows
        description: Number of rows that were scanned but not used by the query when the column was part of the predicate, indicating wasted scan work that was done
        expr: SUM(column_pruning.rows_scanned - column_pruning.rows_matched)
        access_modifier: public_access
      - name: COLUMNS_WITH_SEARCH_OPTIMIZATION
        synonyms:
          - columns needing search optimization
          - search opt opportunities
          - search optimization candidates
        description: Number of distinct columns that could benefit from search optimization
        expr: COUNT(DISTINCT CASE WHEN column_pruning.search_optimization_supported_expressions IS NOT NULL THEN column_pruning.column_id ELSE NULL END)
        access_modifier: public_access
      - name: TOTAL_COLUMN_USAGE
        synonyms:
          - cumulative column usage
          - total column queries
        description: Total number of queries using the column for filtering
        expr: SUM(column_pruning.num_queries)
        access_modifier: public_access
    primary_key:
      columns:
        - TABLE_ID
        - COLUMN_ID
        - INTERVAL_START_TIME
  - name: QUERY_ACCELERATION_ELIGIBLE
    synonyms:
      - acceleration opportunities
      - QAS eligible queries
      - query acceleration candidates
    description: Queries eligible for Query Acceleration Service (QAS) with potential time savings
    base_table:
      database: SNOWFLAKE
      schema: ACCOUNT_USAGE
      table: QUERY_ACCELERATION_ELIGIBLE
    dimensions:
      - name: QUERY_ID
        synonyms:
          - query identifier
          - query uuid
        description: Unique identifier for the query eligible for acceleration
        expr: query_id
        data_type: VARCHAR(134217728)
      - name: QUERY_TEXT
        synonyms:
          - query
          - query content
          - query sql
          - sql text
        description: Text of the SQL query eligible for acceleration
        expr: query_text
        data_type: VARCHAR(134217728)
      - name: START_TIME
        synonyms:
          - execution start
          - query start
          - start timestamp
        description: Timestamp when the query execution started
        expr: start_time
        data_type: TIMESTAMP_LTZ(6)
      - name: WAREHOUSE_NAME
        synonyms:
          - warehouse
          - warehouse name
        description: Name of the warehouse that executed the query. ALWAYS include warehouse_size when selecting warehouse_name.
        expr: warehouse_name
        data_type: VARCHAR(134217728)
      - name: WAREHOUSE_SIZE
        synonyms:
          - compute size
          - warehouse size
        description: Size of the warehouse that executed the query. MUST always be included when warehouse_name is selected.
        expr: warehouse_size
        data_type: VARCHAR(134217728)
    facts:
      - name: ELIGIBLE_QUERY_ACCELERATION_TIME
        synonyms:
          - acceleration potential
          - eligible acceleration time
          - QAS time savings
        description: Estimated time (in seconds) that could be saved by enabling Query Acceleration Service
        expr: eligible_query_acceleration_time
        data_type: NUMBER(38,0)
        access_modifier: public_access
      - name: UPPER_LIMIT_SCALE_FACTOR
        synonyms:
          - acceleration potential
          - eligible acceleration time
          - QAS scale factor
        description: The largest scale factor that could be used to accelerate the query
        expr: upper_limit_scale_factor
        data_type: NUMBER(38,0)
        access_modifier: public_access
    metrics:
      - name: AVG_QAS_POTENTIAL_SAVINGS
        synonyms:
          - average QAS savings potential
          - mean acceleration time savings
        description: Average potential time savings (in seconds) per eligible query
        expr: AVG(query_acceleration_eligible.eligible_query_acceleration_time)
        access_modifier: public_access
      - name: QAS_ELIGIBLE_COUNT
        synonyms:
          - acceleration eligible queries
          - number of QAS candidates
          - QAS opportunity count
        description: Number of queries eligible for Query Acceleration Service
        expr: COUNT(query_acceleration_eligible.query_id)
        access_modifier: public_access
      - name: TOTAL_QAS_POTENTIAL_SAVINGS
        synonyms:
          - cumulative acceleration time savings
          - total QAS savings potential
        description: Total potential time savings (in seconds) from enabling Query Acceleration Service
        expr: SUM(query_acceleration_eligible.eligible_query_acceleration_time)
        access_modifier: public_access
    primary_key:
      columns:
        - QUERY_ID
  - name: QUERY_HISTORY
    synonyms:
      - query execution data
      - query metrics
      - query performance
      - query stats
    description: Historical query execution metrics including execution time, spilling, caching, and resource usage
    base_table:
      database: SNOWFLAKE
      schema: ACCOUNT_USAGE
      table: QUERY_HISTORY
    dimensions:
      - name: END_TIME
        synonyms:
          - completion timestamp
          - execution end
          - query end
        description: Timestamp when the query execution completed
        expr: end_time
        data_type: TIMESTAMP_LTZ(6)
      - name: EXECUTION_STATUS
        synonyms:
          - execution result
          - query outcome
          - query status
        description: Execution status of the query (e.g., SUCCESS, FAILED, CANCELLED)
        expr: execution_status
        data_type: VARCHAR(134217728)
      - name: QUERY_ID
        synonyms:
          - query identifier
          - query uuid
        description: Unique identifier for the query
        expr: query_id
        data_type: VARCHAR(134217728)
      - name: QUERY_PARAMETERIZED_HASH
        synonyms:
          - parameterized hash
          - query template hash
          - query_hash
          - query_signature
        description: Hash value based on parameterized query text for grouping queries with same structure
        expr: query_parameterized_hash
        data_type: VARCHAR(134217728)
      - name: QUERY_TEXT
        synonyms:
          - query sql
          - sql statement
          - sql text
        description: Full SQL text of the executed query
        expr: query_text
        data_type: VARCHAR(134217728)
      - name: QUERY_TYPE
        synonyms:
          - operation type
          - sql type
          - statement type
        description: Type of SQL statement executed (e.g., SELECT, INSERT, UPDATE)
        expr: query_type
        data_type: VARCHAR(134217728)
      - name: START_TIME
        synonyms:
          - execution start
          - query start
          - start timestamp
        description: Timestamp when the query execution started
        expr: start_time
        data_type: TIMESTAMP_LTZ(6)
      - name: USER_NAME
        synonyms:
          - executed by
          - query user
          - user
        description: Name of the user who executed the query
        expr: user_name
        data_type: VARCHAR(134217728)
      - name: WAREHOUSE_ID
        synonyms:
          - warehouse ID
          - warehouse identifier
        description: System-generated identifier for the warehouse that executed the query
        expr: warehouse_id
        data_type: NUMBER(38,0)
      - name: WAREHOUSE_NAME
        synonyms:
          - warehouse
          - warehouse name
        description: Name of the warehouse that executed the query. ALWAYS include warehouse_size when selecting warehouse_name.
        expr: warehouse_name
        data_type: VARCHAR(134217728)
      - name: WAREHOUSE_SIZE
        synonyms:
          - cluster size
          - warehouse size
          - warehouse tier
        description: Size of the warehouse (e.g., X-Small, Small, Medium, Large, X-Large). MUST always be included when warehouse_name is selected.
        expr: warehouse_size
        data_type: VARCHAR(134217728)
    facts:
      - name: BYTES_SCANNED
        synonyms:
          - bytes read
          - data scanned
          - scan volume
        description: Number of bytes scanned by the query
        expr: bytes_scanned
        data_type: NUMBER(38,0)
        access_modifier: public_access
      - name: BYTES_SPILLED_TO_LOCAL_STORAGE
        synonyms:
          - local disk spill
          - local spilling
          - local spillage
          - memory overflow to local
        description: Number of bytes spilled to local disk when query exceeded available memory
        expr: bytes_spilled_to_local_storage
        data_type: NUMBER(38,0)
        access_modifier: public_access
      - name: BYTES_SPILLED_TO_REMOTE_STORAGE
        synonyms:
          - memory overflow to remote
          - remote disk spill
          - remote spilling
          - remote spillage
        description: Number of bytes spilled to remote storage when query exceeded local storage
        expr: bytes_spilled_to_remote_storage
        data_type: NUMBER(38,0)
        access_modifier: public_access
      - name: COMPILATION_TIME
        synonyms:
          - optimization time
          - parse time
          - query compilation time
        description: Time (in milliseconds) spent compiling the query
        expr: compilation_time
        data_type: NUMBER(38,0)
        access_modifier: public_access
      - name: CREDITS_USED_CLOUD_SERVICES
        synonyms:
          - cloud services credits
          - service layer credits
        description: Credits used for cloud services during query execution
        expr: credits_used_cloud_services
        data_type: FLOAT
        access_modifier: public_access
      - name: EXECUTION_TIME
        synonyms:
          - processing time
          - query duration
          - query execution time
          - run time
        description: Time (in milliseconds) spent executing the query
        expr: execution_time
        data_type: NUMBER(38,0)
        access_modifier: public_access
      - name: PARTITIONS_SCANNED
        synonyms:
          - micro-partitions read
          - scanned partitions
        description: Number of micro-partitions scanned during query execution
        expr: partitions_scanned
        data_type: NUMBER(38,0)
        access_modifier: public_access
      - name: PARTITIONS_TOTAL
        synonyms:
          - available partitions
          - total partitions
        description: Total number of micro-partitions available in queried tables
        expr: partitions_total
        data_type: NUMBER(38,0)
        access_modifier: public_access
      - name: PERCENTAGE_SCANNED_FROM_CACHE
        synonyms:
          - cache hit rate
          - cache percentage
          - cached data percentage
        description: Percentage of data scanned from cache (higher is better for performance)
        expr: percentage_scanned_from_cache
        data_type: FLOAT
        access_modifier: public_access
      - name: QUEUED_OVERLOAD_TIME
        synonyms:
          - concurrency wait time
          - overload wait time
          - queue time due to load
        description: Time (in milliseconds) spent queued due to warehouse overload
        expr: queued_overload_time
        data_type: NUMBER(38,0)
        access_modifier: public_access
      - name: QUEUED_PROVISIONING_TIME
        synonyms:
          - cold start time
          - provisioning wait time
          - warehouse startup time
        description: Time (in milliseconds) spent queued while the warehouse was provisioning
        expr: queued_provisioning_time
        data_type: NUMBER(38,0)
        access_modifier: public_access
      - name: QUERY_ACCELERATION_BYTES_SCANNED
        synonyms:
          - QAS bytes scanned
          - query acceleration bytes
          - QAS scanned bytes
        description: Number of bytes scanned by the query acceleration service. When QAS is enabled, this contributes to bytes_spilled_to_remote_storage. Subtract from remote spilling to estimate true memory-pressure remote spilling.
        expr: query_acceleration_bytes_scanned
        data_type: NUMBER(38,0)
        access_modifier: public_access
      - name: TOTAL_ELAPSED_TIME
        synonyms:
          - end-to-end time
          - total query time
          - wall clock time
        description: Total elapsed time (in milliseconds) from query submission to completion
        expr: total_elapsed_time
        data_type: NUMBER(38,0)
        access_modifier: public_access
      - name: TRANSACTION_BLOCKED_TIME
        synonyms:
          - blocking time
          - lock wait time
          - transaction wait time
        description: Time (in milliseconds) spent blocked by a transaction lock
        expr: transaction_blocked_time
        data_type: NUMBER(38,0)
        access_modifier: public_access
    metrics:
      - name: AVG_BLOCKED_TIME
        synonyms:
          - average blocking time
          - mean transaction wait
        description: Average time queries spent blocked by transaction locks
        expr: AVG(query_history.transaction_blocked_time)
        access_modifier: public_access
      - name: AVG_BYTES_SCANNED
        synonyms:
          - average data scanned
          - mean scan volume
        description: Average bytes scanned per query
        expr: AVG(query_history.bytes_scanned)
        access_modifier: public_access
      - name: AVG_CACHE_HIT_RATE
        synonyms:
          - average local disk cache efficiency
          - average warehouse cache efficiency
          - average cache efficiency
          - mean cache hit percentage
          - typical cache utilization
        description: Average percentage of partitions scanned from local disk cache (warehouse cache). Higher is better. Does NOT measure query result cache or metadata cache.
        expr: AVG(query_history.percentage_scanned_from_cache)
        access_modifier: public_access
      - name: AVG_EXECUTION_TIME
        synonyms:
          - average execution time
          - mean query time
          - typical execution duration
        description: Average query execution time in milliseconds
        expr: AVG(query_history.execution_time)
        access_modifier: public_access
      - name: AVG_LOCAL_SPILLING
        synonyms:
          - average local spill
          - mean local spilling
          - mean local spillage
        description: Average bytes spilled to local disk per query
        expr: AVG(query_history.bytes_spilled_to_local_storage)
        access_modifier: public_access
      - name: AVG_PARTITIONS_SCANNED
        synonyms:
          - average partitions scanned
          - mean partitions scanned per query
        description: Average number of partitions scanned per query
        expr: AVG(query_history.partitions_scanned)
        access_modifier: public_access
      - name: AVG_QUEUED_OVERLOAD_TIME
        synonyms:
          - average overload wait
          - mean queue time
        description: Average time queries spent queued due to warehouse overload
        expr: AVG(query_history.queued_overload_time)
        access_modifier: public_access
      - name: AVG_REMOTE_SPILLING
        synonyms:
          - average remote spill
          - mean remote spilling
          - mean remote spillage
        description: Average bytes spilled to remote storage per query
        expr: AVG(query_history.bytes_spilled_to_remote_storage)
        access_modifier: public_access
      - name: QUERIES_WITH_SPILLING
        synonyms:
          - number of queries with spilling
          - spilling query count
          - number of queries with spillage
          - spillage query count
        description: Number of queries that experienced memory spilling
        expr: COUNT(CASE WHEN (query_history.bytes_spilled_to_local_storage > 0 OR query_history.bytes_spilled_to_remote_storage > 0) THEN 1 ELSE NULL END)
        access_modifier: public_access
      - name: QUERY_COUNT
        synonyms:
          - number of queries
          - query volume
          - total queries
        description: Total number of queries executed
        expr: COUNT(query_history.query_id)
        access_modifier: public_access
      - name: TOTAL_BLOCKED_TIME
        synonyms:
          - cumulative transaction wait
          - total blocking time
        description: Total time queries spent blocked by transaction locks
        expr: SUM(query_history.transaction_blocked_time)
        access_modifier: public_access
      - name: TOTAL_BYTES_SCANNED
        synonyms:
          - cumulative scan volume
          - total data scanned
        description: Total bytes scanned across all queries
        expr: SUM(query_history.bytes_scanned)
        access_modifier: public_access
      - name: TOTAL_EXECUTION_TIME
        synonyms:
          - cumulative execution time
          - total query time
        description: Total query execution time in milliseconds
        expr: SUM(query_history.execution_time)
        access_modifier: public_access
      - name: TOTAL_QUEUED_OVERLOAD_TIME
        synonyms:
          - cumulative queue time
          - total overload wait
        description: Total time queries spent queued due to warehouse overload
        expr: SUM(query_history.queued_overload_time)
        access_modifier: public_access
      - name: TOTAL_SPILLING
        synonyms:
          - aggregate spilling
          - cumulative disk spill
          - total memory spilling
          - aggregate spillage
          - total memory spillage
        description: Total bytes spilled to disk due to insufficient memory
        expr: SUM(query_history.bytes_spilled_to_local_storage + query_history.bytes_spilled_to_remote_storage)
        access_modifier: public_access
    primary_key:
      columns:
        - QUERY_ID
  - name: TABLE_PRUNING
    synonyms:
      - partition pruning stats
      - table pruning access patterns
      - table pruning data
      - table pruning rate
    description: Aggregated table-level pruning statistics showing how efficiently queries access paritions in a table
    base_table:
      database: SNOWFLAKE
      schema: ACCOUNT_USAGE
      table: TABLE_QUERY_PRUNING_HISTORY
    dimensions:
      - name: DATABASE_ID
        synonyms:
          - database identifier
          - database unique identifier
        description: System-generated identifier for the database
        expr: database_id
        data_type: NUMBER(38,0)
      - name: DATABASE_NAME
        synonyms:
          - database
          - table database
        description: Upper Case name of the database containing the table
        expr: database_name
        data_type: VARCHAR(16777216)
      - name: INTERVAL_END_TIME
        synonyms:
          - table aggregation end
          - table interval finish
          - table period end
        description: End time of the aggregation interval for table pruning statistics
        expr: interval_end_time
        data_type: TIMESTAMP_LTZ(9)
      - name: INTERVAL_START_TIME
        synonyms:
          - table aggregation start
          - table interval begin
          - table period start
        description: Start time of the aggregation interval for table pruning statistics
        expr: interval_start_time
        data_type: TIMESTAMP_LTZ(9)
      - name: QUERY_HASH
        synonyms:
          - canonical query hash
          - query pattern hash
          - query signature
        description: Hash value based on canonicalized SQL text, useful for identifying similar query patterns
        expr: query_hash
        data_type: VARCHAR(16777216)
      - name: QUERY_PARAMETERIZED_HASH
        synonyms:
          - parameterized hash
          - query template hash
          - query_hash
          - query_signature
        description: Hash value based on parameterized query text, useful for grouping queries with same structure but different literals
        expr: query_parameterized_hash
        data_type: VARCHAR(16777216)
      - name: SCHEMA_ID
        synonyms:
          - schema identifier
          - schema unique identifier
        description: System-generated identifier for the schema
        expr: schema_id
        data_type: NUMBER(38,0)
      - name: SCHEMA_NAME
        synonyms:
          - schema
          - table schema
        description: Upper Case name of the schema containing the table
        expr: schema_name
        data_type: VARCHAR(16777216)
      - name: TABLE_ID
        synonyms:
          - table identifier
          - table unique identifier
        description: System-generated identifier for the table
        expr: table_id
        data_type: NUMBER(38,0)
      - name: TABLE_NAME
        synonyms:
          - table
          - table object name
        description: Upper Case name of the table accessed
        expr: table_name
        data_type: VARCHAR(16777216)
      - name: WAREHOUSE_ID
        synonyms:
          - warehouse identifier
          - warehouse unique identifier
        description: System-generated identifier for the warehouse that executed the query
        expr: warehouse_id
        data_type: NUMBER(38,0)
    facts:
      - name: AGGREGATE_QUERY_COMPILATION_TIME
        synonyms:
          - aggregate query compilation time
          - query compilation time
          - total query compilation time
        description: Total compilation time (in milliseconds) for all queries accessing this table during the interval
        expr: aggregate_query_compilation_time
        data_type: NUMBER(38,0)
        access_modifier: public_access
      - name: AGGREGATE_QUERY_ELAPSED_TIME
        synonyms:
          - aggregate query elapsed time
          - query execution time
          - total query time
        description: Total elapsed time (in milliseconds) for all queries accessing this table during the interval
        expr: aggregate_query_elapsed_time
        data_type: NUMBER(38,0)
        access_modifier: public_access
      - name: AGGREGATE_QUERY_EXECUTION_TIME
        synonyms:
          - aggregate query execution time
          - query execution time
          - total query execution time
        description: Total execution time (in milliseconds) for all queries accessing this table during the interval
        expr: aggregate_query_execution_time
        data_type: NUMBER(38,0)
        access_modifier: public_access
      - name: NUM_QUERIES
        synonyms:
          - queries accessing table
          - table query count
        description: Number of queries that accessed this table during the interval
        expr: num_queries
        data_type: NUMBER(38,0)
        access_modifier: public_access
      - name: PARTITIONS_PRUNED
        synonyms:
          - excluded partitions
          - pruned table partitions
          - table partitions skipped
        description: Number of partitions successfully pruned (not scanned) for this table during the interval
        expr: partitions_pruned
        data_type: NUMBER(38,0)
        access_modifier: public_access
      - name: PARTITIONS_SCANNED
        synonyms:
          - scanned table partitions
          - table partitions read
        description: Number of partitions scanned for this table during the interval
        expr: partitions_scanned
        data_type: NUMBER(38,0)
        access_modifier: public_access
      - name: ROWS_MATCHED
        synonyms:
          - filtered table rows
          - matching table rows
          - table rows returned
        description: Number of rows from this table that matched query predicates during the interval
        expr: rows_matched
        data_type: NUMBER(38,0)
        access_modifier: public_access
      - name: ROWS_PRUNED
        synonyms:
          - excluded rows
          - pruned table rows
          - table rows skipped
        description: Number of rows successfully pruned (not scanned) from this table during the interval
        expr: rows_pruned
        data_type: NUMBER(38,0)
        access_modifier: public_access
      - name: ROWS_SCANNED
        synonyms:
          - scanned table rows
          - table rows read
        description: Number of rows scanned from this table during the interval
        expr: rows_scanned
        data_type: NUMBER(38,0)
        access_modifier: public_access
    metrics:
      - name: AVG_ROWS_SCANNED_PER_QUERY
        synonyms:
          - average rows scanned per query
          - mean rows scanned per query
        description: Average number of rows scanned per query accessing the table
        expr: AVG(table_pruning.rows_scanned / NULLIF(table_pruning.num_queries, 0))
        access_modifier: public_access
      - name: PARTITION_PRUNING_PERCENTAGE
        synonyms:
          - table partition skip rate
          - table pruning percentage
          - table pruning rate
        description: Average percentage of partitions pruned at table level, indicating work avoided by pruning
        expr: AVG(CASE WHEN (table_pruning.partitions_scanned + table_pruning.partitions_pruned) > 0 THEN (table_pruning.partitions_pruned::FLOAT / (table_pruning.partitions_scanned + table_pruning.partitions_pruned)) * 100 ELSE 0 END)
        access_modifier: public_access
      - name: ROW_PRUNING_PERCENTAGE
        synonyms:
          - table filter efficiency
          - table row pruning rate
          - table-level pruning percentage
        description: Average percentage of rows pruned per query accessing the table
        expr: AVG(CASE WHEN (table_pruning.rows_scanned + table_pruning.rows_pruned) > 0 THEN (table_pruning.rows_pruned::FLOAT / (table_pruning.rows_scanned + table_pruning.rows_pruned)) * 100 ELSE 0 END)
        access_modifier: public_access
      - name: ROW_UNUSED_PERCENTAGE
        synonyms:
          - row unused percentage
          - row unused rate
          - wasted rows
        description: Average percentage of rows unused in a scan on this table, indicating the optimal storage effectiveness of a workload
        expr: (CASE WHEN (sum(table_pruning.rows_scanned) + sum(table_pruning.rows_pruned)) > 0 THEN 100 - (sum(table_pruning.rows_matched)::FLOAT / (sum(table_pruning.rows_scanned) + sum(table_pruning.rows_pruned))) * 100 ELSE 0 END)
        access_modifier: public_access
      - name: ROW_WASTED_COUNT
        synonyms:
          - row unused count
          - rows unused
          - wasted rows
        description: Number of rows that were scanned but not used by the query, indicating wasted scan work that was done
        expr: SUM(table_pruning.rows_scanned - table_pruning.rows_matched)
        access_modifier: public_access
      - name: TOTAL_TABLE_PARTITIONS_PRUNED
        synonyms:
          - cumulative table partitions pruned
          - total table partitions skipped
        description: Total partitions pruned across all table accesses
        expr: SUM(table_pruning.partitions_pruned)
        access_modifier: public_access
      - name: TOTAL_TABLE_PARTITIONS_SCANNED
        synonyms:
          - cumulative table partitions scanned
          - total table partitions read
        description: Total partitions scanned across all table accesses
        expr: SUM(table_pruning.partitions_scanned)
        access_modifier: public_access
      - name: TOTAL_TABLE_QUERIES
        synonyms:
          - cumulative table queries
          - total table accesses
        description: Total number of queries accessing tables
        expr: SUM(table_pruning.num_queries)
        access_modifier: public_access
    primary_key:
      columns:
        - TABLE_ID
        - INTERVAL_START_TIME
  - name: QUERY_INSIGHTS
